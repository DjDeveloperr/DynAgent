name: DynAgentMobile
options:
  bundleIdPrefix: dev.dynagent
  deploymentTarget:
    iOS: "17.0"
targets:
  DynAgentMobile:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: ../DynAgentMac/Sources/UI/Models.swift
      - path: ../DynAgentMac/Sources/UI/ComposerModel.swift
      - path: ../DynAgentMac/Sources/UI/ShellToolModel.swift
      - path: ../DynAgentMac/Sources/UI/EditToolModel.swift
      - path: ../DynAgentMac/Sources/UI/TranscriptTurnModel.swift
      - path: ../DynAgentMac/Sources/UI/TranscriptRenderModel.swift
      - path: ../DynAgentMac/Sources/UI/WorkDividerModel.swift
      - path: ../DynAgentMac/Sources/UI/MobilePresentationModel.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dynagent.mobile
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Tailscale uses plain HTTP to an IP, so allow non-TLS loads.
        INFOPLIST_KEY_NSAppTransportSecurity: ""
    info:
      path: Sources/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
